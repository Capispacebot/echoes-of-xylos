<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Echoes of Xylos</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>'use strict';
// ═══════════════════════════════════════════════════════════════
//   ECHOES OF XYLOS  ·  Spirit of Out of This World
// ═══════════════════════════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 450;
C.width = W; C.height = H;

function resize() {
  const s = Math.min(innerWidth/W, innerHeight/H);
  C.style.width  = Math.floor(W*s)+'px';
  C.style.height = Math.floor(H*s)+'px';
}
addEventListener('resize', resize); resize();

// ── Palette ──────────────────────────────────────────────────
const COL = {
  skyA:'#02000c', skyB:'#080020', skyC:'#120038',
  mtnA:'#0e0228', mtnB:'#07011a',
  rock:'#1e0a44', rockEdge:'#3a1870', rockHi:'#5028a0',
  ground:'#150530', groundTop:'#2a1060',
  flora1:'#007744', flora2:'#00dd88', floraGlow:'rgba(0,220,120,0.25)',
  player:'#c8a060', playerD:'#7a5030',
  suit:'#3355aa', suitD:'#1e3366', visor:'#88ddff',
  guard:'#993300', guardD:'#661f00', armor:'#bb4400',
  gVisor:'#ff8800',
  laserP:'#55ffcc', laserC:'#ffcc00', laserG:'#ff3300',
  shield:'#2299ff', shieldGlow:'rgba(34,153,255,0.3)',
};

// ── Input ─────────────────────────────────────────────────────
const K = {};
addEventListener('keydown', e=>{ K[e.key]=true;  e.preventDefault(); });
addEventListener('keyup',   e=>{ K[e.key]=false; });
const held  = k => !!K[k];
const any   = (...ks) => ks.some(k=>K[k]);

// ── Math ──────────────────────────────────────────────────────
const lerp  = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

// ── Draw utils ────────────────────────────────────────────────
function poly(pts, fill, stroke, lw=2) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  if (fill)   { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}
function circ(x,y,r,fill,stroke,lw=2) {
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  if (fill)   { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}
function ln(x1,y1,x2,y2,col,lw=2) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke();
}

// ── Particles ─────────────────────────────────────────────────
const PARTS = [];
function spark(x,y,n,cfg={}) {
  for (let i=0;i<n;i++) {
    const ang = cfg.ang!==undefined
      ? cfg.ang + (Math.random()-.5)*(cfg.spread||Math.PI*2)
      : Math.random()*Math.PI*2;
    const spd = (cfg.spd||3)*(0.4+Math.random()*0.6);
    PARTS.push({
      x, y,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life:1, dec:cfg.dec||0.03,
      r:cfg.r||3, col:cfg.col||'#fff', grav:cfg.grav||0
    });
  }
}
function tickParts() {
  for (let i=PARTS.length-1;i>=0;i--) {
    const p=PARTS[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav;
    p.vx*=0.95; p.vy*=0.95; p.life-=p.dec;
    if (p.life<=0) PARTS.splice(i,1);
  }
}
function drawParts(cx) {
  ctx.save();
  PARTS.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    circ(p.x-cx, p.y, p.r*p.life, p.col);
  });
  ctx.globalAlpha=1; ctx.restore();
}

// ── World data ────────────────────────────────────────────────
const GY  = 385;   // ground top Y
const LW  = 2000;  // world width

// Platforms {x,y,w,h} — y=top edge
const PLATS = [
  // Ground (index 0,1)
  {x:-200, y:GY, w:660, h:80},   // Ground A ends at x=460
  {x:550,  y:GY, w:1650, h:80},  // Ground B  (gap 460..550 = 90px)
  // Elevated rocks (one-way, land from above only)
  {x:90,   y:GY-90,  w:100, h:16},
  {x:260,  y:GY-145, w:90,  h:16},
  {x:400,  y:GY-100, w:80,  h:16},
  {x:510,  y:GY-75,  w:80,  h:16},
  {x:720,  y:GY-80,  w:110, h:16},
  {x:960,  y:GY-115, w:100, h:16},
  {x:1200, y:GY-85,  w:130, h:16},
  {x:1520, y:GY-95,  w:110, h:16},
  {x:1750, y:GY-75,  w:140, h:16},
];

// Checkpoints
const CPS = [
  {x:60,   y:GY, activated:false},
  {x:640,  y:GY, activated:false},
  {x:1350, y:GY, activated:false},
];

// Alien flora {x, y, type 0|1|2}
const FLORA = [
  {x:50,y:GY,t:0},{x:130,y:GY-90,t:1},{x:310,y:GY,t:2},
  {x:580,y:GY,t:0},{x:800,y:GY,t:1},{x:870,y:GY-80,t:0},
  {x:1080,y:GY,t:2},{x:1280,y:GY,t:0},{x:1430,y:GY,t:1},
  {x:1620,y:GY,t:2},{x:1820,y:GY,t:0},{x:1950,y:GY,t:1},
];

// Exit portal
const EXIT = {x:1930, y:GY-90, w:40, h:90};

// ── Camera ────────────────────────────────────────────────────
const CAM = {x:0, tx:0};
function moveCam(px) {
  CAM.tx = clamp(px - W*0.33, 0, LW - W);
  CAM.x  = lerp(CAM.x, CAM.tx, 0.07);
}

// ── Projectiles ───────────────────────────────────────────────
const PROJS = [];
function fire(x,y,dir,type,owner) {
  const T = {
    basic:  {spd:13, r:3, col:COL.laserP, ttl:90},
    charged:{spd:16, r:6, col:COL.laserC, ttl:110},
    guard:  {spd:9,  r:3, col:COL.laserG, ttl:100},
  }[type];
  PROJS.push({x,y,vx:dir*T.spd,type,r:T.r,col:T.col,owner,ttl:T.ttl});
}
function tickProjs() {
  for (let i=PROJS.length-1;i>=0;i--) {
    const p=PROJS[i];
    p.x+=p.vx; p.ttl--;
    if (p.ttl<=0||hitsTerrain(p.x,p.y,4)) {
      spark(p.x,p.y,7,{spd:3,col:p.col,dec:0.06,grav:0.05,spread:1,ang:p.vx>0?Math.PI:0});
      PROJS.splice(i,1);
    }
  }
}
function hitsTerrain(x,y,r=0) {
  return PLATS.some(p=>x>p.x-r&&x<p.x+p.w+r&&y>p.y-r&&y<p.y+p.h+r);
}
function drawProjs(cx) {
  PROJS.forEach(p=>{
    ctx.save();
    ctx.shadowColor=p.col; ctx.shadowBlur=p.type==='charged'?18:8;
    circ(p.x-cx, p.y, p.r, p.col);
    if (p.type==='charged') {
      ctx.globalAlpha=0.25;
      circ(p.x-cx, p.y, p.r*2.8, p.col);
    }
    ctx.restore();
  });
}

// ── Collision ─────────────────────────────────────────────────
function resolve(ent) {
  ent.onGround = false;
  const hw = ent.w/2;
  PLATS.forEach((pl,i)=>{
    const eL=ent.x-hw, eR=ent.x+hw, eT=ent.y-ent.h, eB=ent.y;
    if (eR<=pl.x||eL>=pl.x+pl.w||eB<=pl.y||eT>=pl.y+pl.h) return;
    if (i >= 2) {
      // One-way elevated: only land from above
      if (ent.vy>=0 && eB-ent.vy <= pl.y+4) {
        ent.y=pl.y; ent.vy=0; ent.onGround=true;
      }
    } else {
      // Ground: full AABB
      const dTop  = eB - pl.y;
      const dBot  = pl.y+pl.h - eT;
      const dLeft = eR - pl.x;
      const dRight= pl.x+pl.w - eL;
      const min   = Math.min(dTop,dBot,dLeft,dRight);
      if      (min===dTop  && ent.vy>=0) { ent.y=pl.y; ent.vy=0; ent.onGround=true; }
      else if (min===dBot  && ent.vy<0)  { ent.y=pl.y+pl.h+ent.h; ent.vy=0; }
      else if (min===dLeft && ent.vx>0)  { ent.x=pl.x-hw; ent.vx=0; }
      else if (min===dRight&& ent.vx<0)  { ent.x=pl.x+pl.w+hw; ent.vx=0; }
    }
  });
}

// ── Player ────────────────────────────────────────────────────
const PL = {
  x:80, y:GY, vx:0, vy:0, w:18, h:48,
  onGround:false, facing:1,
  state:'idle',   // idle run jump crouch shoot dead
  charge:0, shield:false, shieldE:100,
  inv:0, dead:false, deadT:0,
  spawnX:80, spawnY:GY,
  frame:0, ft:0,
};
const GRAV=0.46, VMAX=4.5, JF=-10.4, GF=0.72, AF=0.89;

function tickPlayer() {
  if (PL.dead) {
    PL.vy+=GRAV; PL.y+=PL.vy; PL.x+=PL.vx; PL.vx*=0.9;
    if (--PL.deadT<=0) respawn();
    return;
  }
  if (PL.inv>0) PL.inv--;

  const goL  = any('ArrowLeft','a');
  const goR  = any('ArrowRight','d');
  const doJ  = any('ArrowUp','w','z');
  const doC  = any('ArrowDown','s') && !goL && !goR;
  const doSh = any('Shift','f');
  const doFire = held(' ') || held('x');

  // Shield
  if (doSh && PL.shieldE>0) {
    PL.shield=true; PL.shieldE=Math.max(0,PL.shieldE-0.8);
  } else {
    PL.shield=false; PL.shieldE=Math.min(100,PL.shieldE+0.25);
  }

  // Gun charge / fire
  if (doFire) {
    PL.charge = Math.min(80, PL.charge+1);
  } else if (PL.charge>0) {
    const type = PL.charge>=55 ? 'charged' : 'basic';
    const gx = PL.x + PL.facing*(PL.w/2+4);
    const gy = PL.y - PL.h*0.45;
    fire(gx,gy,PL.facing,type,'player');
    if (type==='charged')
      spark(gx,gy,14,{spd:5,col:COL.laserC,dec:0.04,spread:0.4,ang:PL.facing>0?0:Math.PI});
    PL.charge=0;
  }

  // Movement
  if (!doC) {
    if (goL) { PL.vx-=0.7; PL.facing=-1; }
    if (goR) { PL.vx+=0.7; PL.facing= 1; }
  }

  // Jump
  if (doJ && PL.onGround) {
    PL.vy=JF; PL.onGround=false;
    spark(PL.x,PL.y,8,{spd:2,col:'#664488',dec:0.07,grav:0.04,spread:1.2,ang:-Math.PI/2});
  }

  // Physics
  PL.vy+=GRAV;
  PL.x+=PL.vx; PL.y+=PL.vy;
  PL.vx*=(PL.onGround?GF:AF);
  PL.vx=clamp(PL.vx,-VMAX,VMAX);
  resolve(PL);
  PL.x=clamp(PL.x,0,LW-10);
  if (PL.y>H+120) diePL();

  // State
  if (PL.onGround) {
    PL.state = doC ? 'crouch' : (Math.abs(PL.vx)>0.3||goL||goR) ? 'run' : doFire ? 'shoot' : 'idle';
  } else { PL.state='jump'; }

  // Checkpoints
  CPS.forEach(cp=>{
    if (!cp.activated && Math.abs(PL.x-cp.x)<50 && PL.onGround) {
      cp.activated=true; PL.spawnX=cp.x; PL.spawnY=cp.y;
      spark(cp.x,cp.y-20,18,{spd:4,col:'#44ffff',dec:0.025,grav:-0.02,spread:Math.PI*2});
    }
  });

  // Guard projectile hits
  if (!PL.dead && PL.inv===0) {
    for (let i=PROJS.length-1;i>=0;i--) {
      const p=PROJS[i]; if (p.owner!=='guard') continue;
      if (Math.abs(p.x-PL.x)<PL.w && Math.abs(p.y-(PL.y-PL.h/2))<PL.h) {
        if (PL.shield) {
          spark(p.x,p.y,10,{spd:4,col:COL.shield,dec:0.05,spread:Math.PI*2});
        } else {
          diePL();
        }
        PROJS.splice(i,1);
      }
    }
  }

  // Win condition
  if (!PL.dead && guards.every(g=>g.state==='dead') &&
      Math.abs(PL.x-EXIT.x)<60 && PL.y>EXIT.y) {
    GS.state='win';
  }

  // Anim
  if (++PL.ft>7) { PL.frame=(PL.frame+1)%4; PL.ft=0; }
  moveCam(PL.x);
}

function diePL() {
  if (PL.dead||PL.inv>0) return;
  PL.dead=true; PL.deadT=130;
  PL.vy=-8; PL.vx=PL.facing*-2;
  spark(PL.x,PL.y-PL.h/2,25,{spd:5,col:'#ff8844',dec:0.022,grav:0.06,spread:Math.PI*2});
  GS.flash=30; GS.flashCol='rgba(200,0,0,0.45)';
}

function respawn() {
  PL.dead=false; PL.x=PL.spawnX; PL.y=PL.spawnY;
  PL.vx=0; PL.vy=0; PL.inv=90; PL.shield=false; PL.charge=0;
  GUARDS.forEach(g=>g.reset());
  PROJS.length=0;
}

// ── Draw Player ───────────────────────────────────────────────
function drawPlayer(cx) {
  if (PL.dead) { drawDeadPL(cx); return; }
  const x=Math.round(PL.x-cx), y=Math.round(PL.y);
  const f=PL.facing;

  ctx.save();
  if (PL.inv>0 && Math.floor(PL.inv/5)%2===0) ctx.globalAlpha=0.35;

  // Shield aura
  if (PL.shield) {
    ctx.save(); ctx.shadowBlur=20; ctx.shadowColor=COL.shield;
    ctx.globalAlpha=0.4;
    circ(x,y-PL.h/2,PL.h*0.66,COL.shieldGlow);
    ctx.globalAlpha=1;
    circ(x,y-PL.h/2,PL.h*0.66,null,COL.shield,2);
    ctx.restore();
  }

  const st=PL.state, fr=PL.frame;

  if (st==='crouch')     drawPL_crouch(x,y,f);
  else if (st==='jump')  drawPL_jump(x,y,f);
  else if (st==='run')   drawPL_run(x,y,f,fr);
  else                   drawPL_idle(x,y,f,fr);

  // Charge glow on gun tip
  if (PL.charge>0) {
    const pct=PL.charge/55;
    ctx.save(); ctx.shadowBlur=12; ctx.shadowColor=PL.charge>=55?COL.laserC:COL.laserP;
    circ(x+f*14, y-PL.h*0.44, 2+pct*5, PL.charge>=55?COL.laserC:COL.laserP);
    ctx.restore();
  }
  ctx.restore();
}

function drawDeadPL(cx) {
  const x=Math.round(PL.x-cx), y=Math.round(PL.y);
  ctx.globalAlpha=0.75;
  poly([[x-20,y-6],[x+14,y-6],[x+14,y-2],[x-20,y-2]], COL.suit,'#000',1);
  circ(x+16,y-4,7,COL.player,'#000',2);
  ctx.globalAlpha=1;
}

function drawPL_idle(x,y,f,fr) {
  const bob=Math.sin(fr*Math.PI/2)*1.5;
  circ(x+f*2, y-46+bob, 8, COL.player,'#000',2);
  poly([[x-4,y-48+bob],[x+8,y-48+bob],[x+8,y-44+bob],[x-4,y-44+bob]], COL.visor);
  poly([[x-8,y-38+bob],[x+8,y-38+bob],[x+9,y-20],[x-9,y-20]], COL.suit,'#000',2);
  poly([[x-9,y-22],[x+9,y-22],[x+9,y-18],[x-9,y-18]], COL.suitD);
  poly([[x-8,y-18],[x-2,y-18],[x-2,y],[x-9,y]], COL.suit,'#000',1.5);
  poly([[x+2,y-18],[x+8,y-18],[x+9,y],[x+2,y]], COL.suit,'#000',1.5);
  poly([[x-10,y-3],[x-1,y-3],[x-1,y+2],[x-10,y+2]], COL.playerD,'#000',1);
  poly([[x+1,  y-3],[x+10,y-3],[x+10,y+2],[x+1, y+2]], COL.playerD,'#000',1);
  // Gun arm
  poly([[x+f*6,y-33+bob],[x+f*14,y-29+bob],[x+f*14,y-23+bob],[x+f*5,y-26+bob]], COL.suit,'#000',1.5);
  ctx.fillStyle='#334466'; ctx.fillRect(x+f*(f>0?13:3),y-31+bob, 10,4);
  // Other arm
  poly([[x-f*5,y-34+bob],[x-f*10,y-34+bob],[x-f*10,y-26+bob],[x-f*4,y-26+bob]], COL.suitD,'#000',1.5);
}

function drawPL_run(x,y,f,fr) {
  const sw=Math.sin(fr*Math.PI/2)*11;
  circ(x+f*2,y-46,8,COL.player,'#000',2);
  poly([[x-3,y-48],[x+7,y-48],[x+7,y-44],[x-3,y-44]], COL.visor);
  poly([[x-8,y-38],[x+8,y-38],[x+9,y-20],[x-9,y-20]], COL.suit,'#000',2);
  poly([[x-9,y-22],[x+9,y-22],[x+9,y-18],[x-9,y-18]], COL.suitD);
  poly([[x-8,y-18],[x-2,y-18],[x-2+sw*0.3,y],[x-9+sw*0.1,y]], COL.suit,'#000',1.5);
  poly([[x+2,y-18],[x+8,y-18],[x+8-sw*0.3,y],[x+2-sw*0.1,y]], COL.suit,'#000',1.5);
  poly([[x-10+sw*0.2,y-3],[x-1+sw*0.2,y-3],[x-1+sw*0.2,y+2],[x-10+sw*0.2,y+2]], COL.playerD,'#000',1);
  poly([[x+1 -sw*0.2,y-3],[x+10-sw*0.2,y-3],[x+10-sw*0.2,y+2],[x+1-sw*0.2,y+2]], COL.playerD,'#000',1);
  poly([[x+f*5,y-33],[x+f*13,y-29+sw*0.25],[x+f*13,y-23+sw*0.25],[x+f*4,y-26]], COL.suit,'#000',1.5);
  ctx.fillStyle='#334466'; ctx.fillRect(x+f*(f>0?12:2),y-30+sw*0.15, 10,4);
  poly([[x-f*4,y-34],[x-f*10,y-34-sw*0.25],[x-f*10,y-26-sw*0.25],[x-f*3,y-26]], COL.suitD,'#000',1.5);
}

function drawPL_jump(x,y,f) {
  circ(x+f*3,y-48,8,COL.player,'#000',2);
  poly([[x-2,y-50],[x+8,y-50],[x+8,y-46],[x-2,y-46]], COL.visor);
  poly([[x-8,y-40],[x+8,y-40],[x+8,y-22],[x-8,y-22]], COL.suit,'#000',2);
  poly([[x-8,y-22],[x+8,y-22],[x+8,y-18],[x-8,y-18]], COL.suitD);
  poly([[x-8,y-18],[x-3,y-18],[x-6,y-5],[x-11,y-5]], COL.suit,'#000',1.5);
  poly([[x+3,y-18],[x+8,y-18],[x+10,y-5],[x+5,y-5]], COL.suit,'#000',1.5);
  poly([[x-12,y-7],[x-4,y-7],[x-4,y-2],[x-12,y-2]], COL.playerD,'#000',1);
  poly([[x+4, y-7],[x+12,y-7],[x+12,y-2],[x+4, y-2]], COL.playerD,'#000',1);
  poly([[x+f*6,y-36],[x+f*15,y-32],[x+f*15,y-26],[x+f*5,y-28]], COL.suit,'#000',1.5);
  ctx.fillStyle='#334466'; ctx.fillRect(x+f*(f>0?13:3),y-33, 10,4);
}

function drawPL_crouch(x,y,f) {
  circ(x+f*2,y-36,8,COL.player,'#000',2);
  poly([[x-3,y-38],[x+7,y-38],[x+7,y-34],[x-3,y-34]], COL.visor);
  poly([[x-9,y-28],[x+9,y-28],[x+9,y-16],[x-9,y-16]], COL.suit,'#000',2);
  poly([[x-9,y-16],[x-3,y-16],[x-3,y-2],[x-10,y-2]], COL.suit,'#000',1.5);
  poly([[x+3,y-16],[x+9,y-16],[x+10,y-2],[x+3,y-2]], COL.suit,'#000',1.5);
  poly([[x-12,y-4],[x-1,y-4],[x-1,y+2],[x-12,y+2]], COL.playerD,'#000',1);
  poly([[x+1,  y-4],[x+12,y-4],[x+12,y+2],[x+1, y+2]], COL.playerD,'#000',1);
  poly([[x+f*6,y-24],[x+f*15,y-22],[x+f*15,y-16],[x+f*5,y-16]], COL.suit,'#000',1.5);
  ctx.fillStyle='#334466'; ctx.fillRect(x+f*(f>0?13:3),y-23, 10,4);
}

// ── Guard ─────────────────────────────────────────────────────
class Guard {
  constructor(x, pl, pr, facing=1) {
    this.sx=x; this.sy=GY;
    this.x=x;  this.y=GY;
    this.vx=0; this.vy=0;
    this.w=22; this.h=48;
    this.onGround=false; this.facing=facing;
    this.pl=pl; this.pr=pr;
    this.state='patrol';
    this.hp=2; this.alertT=0; this.shootCd=0;
    this.frame=0; this.ft=0;
  }
  reset() {
    this.x=this.sx; this.y=this.sy;
    this.vx=0; this.vy=0;
    this.state='patrol'; this.hp=2;
    this.alertT=0; this.shootCd=0; this.facing=1;
  }
  canSee() {
    if (PL.dead) return false;
    const dx=PL.x-this.x, dy=(PL.y-PL.h/2)-(this.y-this.h/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    if (dist>300) return false;
    if (dist>40 && Math.sign(dx)!==this.facing) return false;
    return true;
  }
  tick() {
    if (this.state==='dead') return;
    this.vy+=GRAV; this.shootCd=Math.max(0,this.shootCd-1);
    switch(this.state) {
      case 'patrol':
        this.vx=this.facing*1.5;
        if (this.x>=this.pr) this.facing=-1;
        if (this.x<=this.pl) this.facing=1;
        if (this.canSee()) { this.state='alert'; this.alertT=55; this.vx=0; }
        break;
      case 'alert':
        this.vx*=0.8;
        this.alertT--;
        this.facing = PL.x>this.x ? 1 : -1;
        if (this.alertT<=0) this.state='attack';
        if (!this.canSee()) this.state='patrol';
        break;
      case 'attack':
        const dx=PL.x-this.x; this.facing=dx>0?1:-1;
        this.vx = Math.abs(dx)>220 ? this.facing*2.2 : this.vx*0.85;
        if (this.shootCd===0 && Math.abs(dx)<320) {
          fire(this.x+this.facing*(this.w/2+4), this.y-this.h*0.4, this.facing, 'guard','guard');
          this.shootCd=90;
        }
        if (!this.canSee()) this.state='patrol';
        break;
      case 'stunned':
        this.vx*=0.75; this.alertT--;
        if (this.alertT<=0) this.state='attack';
        break;
    }
    this.x+=this.vx; this.y+=this.vy;
    this.onGround=false; resolve(this);
    this.x=clamp(this.x,10,LW-10);

    // Hit by player projectile
    for (let i=PROJS.length-1;i>=0;i--) {
      const p=PROJS[i]; if (p.owner!=='player') continue;
      if (Math.abs(p.x-this.x)<this.w && Math.abs(p.y-(this.y-this.h/2))<this.h) {
        spark(p.x,p.y,10,{spd:4,col:p.type==='charged'?COL.laserC:'#ff6600',dec:0.04,grav:0.05,spread:1.4,ang:p.vx>0?0:Math.PI});
        PROJS.splice(i,1);
        this.hp -= p.type==='charged' ? 2 : 1;
        if (this.hp>0) { this.state='stunned'; this.alertT=35; this.vx=-this.facing*4; }
        if (this.hp<=0) {
          this.state='dead';
          this.vy=-6;
          spark(this.x,this.y-this.h/2,30,{spd:5,col:'#ff4400',dec:0.018,grav:0.08,spread:Math.PI*2});
          spark(this.x,this.y-this.h/2,15,{spd:3,col:'#ffcc00',dec:0.025,grav:0.04,spread:Math.PI*2});
        }
        break;
      }
    }
    if (++this.ft>10) { this.frame=(this.frame+1)%4; this.ft=0; }
  }
  draw(cx) {
    if (this.state==='dead') { this.drawDead(cx); return; }
    const x=Math.round(this.x-cx), y=Math.round(this.y), f=this.facing;
    // Alert "!" indicator
    if (this.state==='alert') {
      ctx.save(); ctx.font='bold 15px monospace';
      ctx.fillStyle='#ff8800'; ctx.shadowBlur=10; ctx.shadowColor='#ff8800';
      ctx.fillText('!', x-5, y-this.h-10);
      ctx.restore();
    }
    const walk = (this.state==='patrol'||this.state==='attack') ? Math.sin(this.frame*Math.PI/2)*10 : 0;
    // Helmet
    poly([[x-11,y-52],[x+11,y-52],[x+13,y-38],[x-13,y-38]], COL.guardD,'#000',2);
    // Visor
    poly([[x-8,y-50],[x+9,y-50],[x+11,y-44],[x-10,y-44]], COL.gVisor,'#000',1);
    // Neck
    ctx.fillStyle=COL.guard; ctx.fillRect(x-4,y-38,8,4);
    // Torso
    poly([[x-11,y-34],[x+11,y-34],[x+12,y-18],[x-12,y-18]], COL.armor,'#000',2);
    // Armor detail lines
    ctx.save(); ctx.globalAlpha=0.35;
    ln(x-6,y-34,x-6,y-18,'#000',1); ln(x+6,y-34,x+6,y-18,'#000',1);
    ln(x-11,y-26,x+11,y-26,'#000',1);
    ctx.restore();
    // Belt
    poly([[x-12,y-20],[x+12,y-20],[x+12,y-16],[x-12,y-16]], COL.guardD,'#000',1);
    // Legs
    poly([[x-10,y-16],[x-3,y-16],[x-3+walk*0.2,y],[x-10+walk*0.1,y]], COL.guard,'#000',1.5);
    poly([[x+3, y-16],[x+10,y-16],[x+10-walk*0.2,y],[x+3-walk*0.1,y]], COL.guard,'#000',1.5);
    // Boots
    poly([[x-12+walk*0.15,y-4],[x-2+walk*0.15,y-4],[x-2+walk*0.15,y+3],[x-12+walk*0.15,y+3]], COL.guardD,'#000',1);
    poly([[x+2 -walk*0.15,y-4],[x+12-walk*0.15,y-4],[x+12-walk*0.15,y+3],[x+2-walk*0.15,y+3]], COL.guardD,'#000',1);
    // Gun arm
    poly([[x+f*8,y-30],[x+f*16,y-26],[x+f*16,y-19],[x+f*7,y-22]], COL.armor,'#000',1.5);
    // Weapon
    ctx.fillStyle='#222'; ctx.fillRect(x+f*(f>0?14:2),y-28, 14,5);
    ctx.fillRect(x+f*(f>0?14:2),y-28, 4,5);
    ctx.fillStyle=COL.laserG; ctx.fillRect(x+f*(f>0?28:2),y-27, f*4,3);
    // Other arm
    poly([[x-f*6,y-30],[x-f*13,y-28+walk*0.3],[x-f*13,y-22+walk*0.3],[x-f*5,y-22]], COL.guardD,'#000',1.5);
  }
  drawDead(cx) {
    const x=Math.round(this.x-cx), y=Math.round(this.y);
    ctx.globalAlpha=0.65;
    poly([[x-22,y-6],[x+16,y-6],[x+16,y-1],[x-22,y-1]], COL.armor,'#000',1);
    circ(x+18,y-4,9,COL.guardD,'#000',2);
    ctx.globalAlpha=1;
  }
}

const GUARDS = [
  new Guard(880,  700, 1100),
  new Guard(1650, 1520, 1860),
];

// ── Background ────────────────────────────────────────────────
// Pre-build star list (deterministic)
const STARS = Array.from({length:90},(_,i)=>({
  x:((i*179+37)%2210)/2210*W,
  y:((i*113+19)%100)/100*H*0.52,
  r:((i*7)%3)/3*1.2+0.3,
  blink:i%5+1,
}));

function drawBG(cx) {
  // Sky
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,COL.skyA); sg.addColorStop(0.65,COL.skyB); sg.addColorStop(1,COL.skyC);
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Stars
  ctx.save();
  const t=Date.now()*0.001;
  STARS.forEach(s=>{
    ctx.globalAlpha=0.25+0.2*Math.sin(t*s.blink+s.x);
    circ(s.x,s.y,s.r,'#aaccff');
  });
  ctx.restore();

  // Far mountains (parallax 0.13)
  const p1=cx*0.13;
  ctx.fillStyle=COL.mtnA;
  ctx.beginPath(); ctx.moveTo(0,H);
  for (let x=0;x<=W+30;x+=35) {
    const mx=x, wx=mx+p1;
    ctx.lineTo(mx, H-200-Math.sin(wx*0.025)*55-Math.sin(wx*0.06)*25);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Near rock formations (parallax 0.28)
  const p2=cx*0.28;
  ctx.fillStyle=COL.mtnB;
  ctx.beginPath(); ctx.moveTo(0,H);
  for (let x=0;x<=W+30;x+=28) {
    const wx=x+p2;
    ctx.lineTo(x, H-130-Math.sin(wx*0.04+1)*42-Math.sin(wx*0.1+2)*18);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Cave ceiling (parallax 0.5)
  const p3=cx*0.5;
  ctx.fillStyle='#050010';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W,0);
  for (let x=W;x>=-30;x-=22) {
    const wx=x+p3;
    ctx.lineTo(x, 28+Math.abs(Math.sin(wx*0.038))*58);
  }
  ctx.closePath(); ctx.fill();
}

// ── Terrain ───────────────────────────────────────────────────
function drawTerrain(cx) {
  PLATS.forEach((p,i)=>{
    const rx=p.x-cx, ry=p.y, rw=p.w;
    if (rx+rw<-30||rx>W+30) return;
    if (i>=2) {
      // Elevated rock
      const pts=[
        [rx-5, ry+p.h+6],[rx-3, ry+2],[rx+5, ry-4],
        [rx+rw*0.3,ry-5],[rx+rw*0.55,ry-3],[rx+rw*0.8,ry-6],
        [rx+rw-2,ry],[rx+rw+4,ry+5],[rx+rw+6,ry+p.h+6],
      ];
      poly(pts,COL.rock,'#000',2);
      ln(rx+3,ry-2,rx+rw-3,ry-1,COL.rockHi,1.5);
    } else {
      // Ground — irregular top
      const step=28;
      const pts=[[rx-4,ry+p.h+5]];
      for (let sx=rx-4;sx<=rx+rw+4;sx+=step) {
        pts.push([sx, ry + Math.sin(sx*0.07+p.x*0.01)*5 + Math.sin(sx*0.15)*2.5]);
      }
      pts.push([rx+rw+4,ry+p.h+5]);
      const tg=ctx.createLinearGradient(rx,ry-20,rx,ry+p.h);
      tg.addColorStop(0,COL.groundTop); tg.addColorStop(0.12,COL.rock); tg.addColorStop(1,COL.ground);
      poly(pts,null,'#000',2);
      ctx.fillStyle=tg; ctx.fill();
      ctx.strokeStyle=COL.rockEdge; ctx.lineWidth=1.5; ctx.stroke();
    }
  });
}

// ── Flora ─────────────────────────────────────────────────────
function drawFlora(cx) {
  const t=Date.now()*0.002;
  ctx.save();
  FLORA.forEach(f=>{
    const fx=f.x-cx, fy=f.y;
    if (fx<-70||fx>W+70) return;
    const sw=Math.sin(t+f.x*0.1)*2.2;
    ctx.shadowBlur=14; ctx.shadowColor=COL.flora2;
    if (f.t===0) {
      const h=28+Math.sin(f.x)*9;
      ln(fx,fy,fx+sw,fy-h,COL.flora1,2);
      circ(fx+sw,fy-h,5,COL.flora2,'#000',1.5);
      ctx.globalAlpha=0.25; circ(fx+sw,fy-h,11,COL.flora2);
      ctx.globalAlpha=1;
    } else if (f.t===1) {
      ln(fx,fy,fx+sw,fy-22,COL.flora1,2);
      ln(fx+sw,fy-22,fx+sw-9+sw,fy-34,COL.flora1,2);
      ln(fx+sw,fy-22,fx+sw+9+sw,fy-32,COL.flora1,2);
      circ(fx+sw-9+sw,fy-34,3,COL.flora2,'#000',1);
      circ(fx+sw+9+sw,fy-32,3,COL.flora2,'#000',1);
    } else {
      ln(fx,fy,fx+sw,fy-20,COL.flora1,2);
      poly([[fx+sw-11,fy-20],[fx+sw+11,fy-20],[fx+sw+8,fy-30],[fx+sw-8,fy-30]], COL.flora2,'#000',1.5);
      ctx.globalAlpha=0.2; ctx.fillStyle=COL.floraGlow; ctx.fillRect(fx+sw-12,fy-30,24,12);
      ctx.globalAlpha=1;
    }
  });
  ctx.restore();
}

// ── Exit portal ───────────────────────────────────────────────
function drawExit(cx) {
  const ex=EXIT.x-cx, ey=EXIT.y;
  const open=GUARDS.every(g=>g.state==='dead');
  const t=Date.now()*0.003;
  ctx.save();
  if (open) {
    ctx.shadowBlur=35; ctx.shadowColor='#00ffcc';
    const g=ctx.createLinearGradient(ex-20,ey,ex-20,ey+EXIT.h);
    g.addColorStop(0,'rgba(0,255,180,0.08)'); g.addColorStop(0.5,'rgba(0,170,255,0.35)'); g.addColorStop(1,'rgba(0,255,180,0.08)');
    ctx.fillStyle=g; ctx.fillRect(ex-22,ey,44,EXIT.h);
    for (let r=0;r<3;r++) {
      ctx.globalAlpha=0.28-r*0.08;
      ctx.strokeStyle='#00ffcc'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(ex,ey+EXIT.h/2,16+r*9+Math.sin(t+r)*4,EXIT.h/2+r*5,0,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    // Floating arrow hint
    ctx.globalAlpha=0.5+0.3*Math.sin(t*2);
    ctx.fillStyle='#00ffcc'; ctx.font='bold 20px monospace';
    ctx.textAlign='center'; ctx.fillText('→', ex, ey-15);
  } else {
    // Locked stone door
    poly([[ex-20,ey],[ex+20,ey],[ex+20,ey+EXIT.h],[ex-20,ey+EXIT.h]],'#1a0840','#3d1880',2);
    poly([[ex-15,ey+6],[ex+15,ey+6],[ex+15,ey+EXIT.h-4],[ex-15,ey+EXIT.h-4]],'#0e0522','#2a1060',1);
    circ(ex,ey+EXIT.h/2-8,8,'#2d1060','#3d1880',1.5);
    ctx.fillStyle='#2d1060'; ctx.fillRect(ex-6,ey+EXIT.h/2-4,12,14);
    ctx.strokeStyle='#3d1880'; ctx.lineWidth=1.5; ctx.strokeRect(ex-6,ey+EXIT.h/2-4,12,14);
  }
  ctx.globalAlpha=1; ctx.textAlign='left'; ctx.restore();
}

// ── Ambient light beams ───────────────────────────────────────
function drawBeams(cx) {
  const t=Date.now()*0.0008;
  ctx.save(); ctx.globalAlpha=0.04;
  for (let i=0;i<4;i++) {
    const bx=((i*420+200)%LW)-cx;
    if (bx<-100||bx>W+100) continue;
    const bw=30+Math.sin(t+i)*10;
    const g=ctx.createLinearGradient(bx,0,bx,GY);
    g.addColorStop(0,'#8844ff'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(bx-bw/2,0); ctx.lineTo(bx+bw/2,0);
    ctx.lineTo(bx+bw*0.7,GY); ctx.lineTo(bx-bw*0.7,GY);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

// ── UI ────────────────────────────────────────────────────────
function drawShieldBar() {
  if (PL.shieldE>=100&&!PL.shield) return;
  ctx.save(); ctx.globalAlpha=0.75;
  ctx.fillStyle='#111'; ctx.fillRect(10,10,84,7);
  const sw=PL.shieldE/100*82;
  ctx.fillStyle=PL.shieldE>30?COL.shield:'#ff4444';
  ctx.fillRect(11,11,sw,5);
  ctx.globalAlpha=0.5; ctx.strokeStyle='#446699'; ctx.lineWidth=1;
  ctx.strokeRect(10,10,84,7);
  ctx.restore();
}
function drawHints() {
  ctx.save(); ctx.globalAlpha=0.28;
  ctx.fillStyle='#aaccff'; ctx.font='10px monospace';
  ctx.fillText('← → move   ↑/Z jump   Space/X fire (hold=charged)   Shift shield   [kill guards → portal opens]', 10, H-10);
  ctx.restore();
}
function drawGuardCount() {
  const alive=GUARDS.filter(g=>g.state!=='dead').length;
  if (alive===0) return;
  ctx.save(); ctx.globalAlpha=0.45;
  ctx.fillStyle='#ff8866'; ctx.font='11px monospace';
  ctx.fillText(`guards: ${alive}`, W-80, 22);
  ctx.restore();
}

// ── Intro ─────────────────────────────────────────────────────
const INTRO = { t:0, done:false, flash:0, portalR:0, pAlpha:0 };
function tickIntro() {
  const t=++INTRO.t;
  if (t<50  && t%14<3)      INTRO.flash=1;
  INTRO.flash=Math.max(0,INTRO.flash-0.12);
  if (t>=50&&t<110)  INTRO.portalR=lerp(0,72,(t-50)/60);
  if (t>=95)  INTRO.pAlpha=clamp((t-95)/55,0,1);
  if (t>=165) INTRO.done=true;
}
function drawIntro() {
  const t=INTRO.t;
  // Black bg
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  // Subtle star layer
  ctx.save(); ctx.globalAlpha=0.4;
  STARS.forEach(s=>circ(s.x,s.y,s.r,'#aaccff'));
  ctx.restore();
  // Lightning flash
  if (INTRO.flash>0) {
    ctx.globalAlpha=INTRO.flash*0.55;
    ctx.fillStyle='#7733cc'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    if (INTRO.flash>0.75) {
      ctx.save(); ctx.strokeStyle='#fff'; ctx.lineWidth=3;
      ctx.shadowBlur=20; ctx.shadowColor='#fff';
      ctx.beginPath(); let lx=W/2,ly=0; ctx.moveTo(lx,ly);
      while(ly<H){lx+=(Math.random()-0.5)*80;ly+=38;ctx.lineTo(lx,ly);}
      ctx.stroke(); ctx.restore();
    }
  }
  // Portal
  if (INTRO.portalR>0) {
    const px=W/2, py=H/2-10;
    ctx.save(); ctx.shadowBlur=40; ctx.shadowColor='#00aaff';
    for (let r=0;r<4;r++) {
      ctx.globalAlpha=(0.55-r*0.11);
      circ(px,py,INTRO.portalR+r*16,'#0044aa66');
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle='#00ccff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px,py,INTRO.portalR,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  // Player silhouette
  if (INTRO.pAlpha>0) {
    const px=W/2, py=H/2+5;
    ctx.save(); ctx.globalAlpha=INTRO.pAlpha;
    circ(px+2,py-46,8,'#00ccff');
    poly([[px-8,py-38],[px+8,py-38],[px+9,py-20],[px-9,py-20]],'#0088cc');
    poly([[px-8,py-20],[px-2,py-20],[px-2,py],[px-9,py]],'#006699');
    poly([[px+2,py-20],[px+8,py-20],[px+9,py],[px+2,py]],'#006699');
    ctx.restore();
  }
  // Fade to black at end
  if (t>140) {
    ctx.globalAlpha=Math.min(1,(t-140)/22);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
  // Skip hint
  if (t>20&&t<120) {
    ctx.save(); ctx.globalAlpha=0.3;
    ctx.fillStyle='#aaddff'; ctx.font='10px monospace';
    ctx.fillText('press any key to skip', W-155, H-10);
    ctx.restore();
  }
  // Skip on keypress
  if (t>15 && Object.values(K).some(v=>v)) INTRO.done=true;
}

// ── Win screen ────────────────────────────────────────────────
function drawWin() {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.shadowBlur=30; ctx.shadowColor='#00ffcc';
  ctx.fillStyle='#00ffcc'; ctx.font='bold 34px monospace';
  ctx.textAlign='center';
  ctx.fillText('YOU ESCAPED', W/2, H/2-18);
  ctx.globalAlpha=0.55; ctx.font='13px monospace'; ctx.fillStyle='#aaddff';
  ctx.fillText('press R to restart', W/2, H/2+20);
  ctx.globalAlpha=1; ctx.textAlign='left'; ctx.restore();
}

// ── Game state ────────────────────────────────────────────────
const GS = { state:'intro', flash:0, flashCol:'rgba(200,0,0,0.4)' };

function tick() {
  switch(GS.state) {
    case 'intro':
      tickIntro();
      if (INTRO.done) { GS.state='play'; }
      break;
    case 'play':
      tickPlayer();
      GUARDS.forEach(g=>g.tick());
      tickProjs();
      tickParts();
      if (any('r','R') && PL.dead) respawn();
      break;
    case 'win':
      tickParts();
      if (any('r','R')) resetGame();
      break;
  }
  if (GS.flash>0) GS.flash--;
}

function resetGame() {
  GS.state='intro';
  Object.assign(INTRO,{t:0,done:false,flash:0,portalR:0,pAlpha:0});
  Object.assign(PL,{
    x:80,y:GY,vx:0,vy:0,onGround:false,facing:1,
    state:'idle',charge:0,shield:false,shieldE:100,
    inv:0,dead:false,deadT:0,spawnX:80,spawnY:GY,frame:0,ft:0,
  });
  CPS.forEach(cp=>cp.activated=false);
  GUARDS.forEach(g=>g.reset());
  PROJS.length=0; PARTS.length=0;
  CAM.x=0; CAM.tx=0;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  if (GS.state==='intro') { drawIntro(); return; }

  const cx=Math.round(CAM.x);
  drawBG(cx);
  drawBeams(cx);
  drawFlora(cx);
  drawTerrain(cx);
  drawExit(cx);
  GUARDS.forEach(g=>g.draw(cx));
  drawProjs(cx);
  drawParts(cx);
  drawPlayer(cx);

  // Screen flash (death)
  if (GS.flash>0) {
    ctx.globalAlpha=GS.flash/30*0.55;
    ctx.fillStyle=GS.flashCol; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
  // Respawn scan-lines
  if (PL.inv>60) {
    ctx.save(); ctx.globalAlpha=0.07; ctx.fillStyle='#fff';
    for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
    ctx.restore();
  }

  drawShieldBar();
  drawGuardCount();
  drawHints();
  if (GS.state==='win') drawWin();
}

// ── Loop ──────────────────────────────────────────────────────
let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/16.67,3); last=ts;
  tick(); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ last=ts; requestAnimationFrame(loop); });
</script>
